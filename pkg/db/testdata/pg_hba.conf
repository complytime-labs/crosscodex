# Integration test pg_hba.conf — requires client certificates
# for all remote (TCP) connections.
#
# Unix domain sockets use "trust" for pg_isready health checks.
# All TCP connections require SSL + password + valid client cert.

# TYPE  DATABASE  USER  ADDRESS      METHOD  OPTIONS

# Local Unix socket connections (pg_isready, init scripts)
local   all       all                trust

# IPv4 TCP connections: require SSL + password + client certificate
hostssl all       all   0.0.0.0/0    md5     clientcert=verify-ca

# IPv6 TCP connections: require SSL + password + client certificate
hostssl all       all   ::/0         md5     clientcert=verify-ca
