version: "3"

includes:
  integration:
    taskfile: test/integration.yml
    dir: "{{.ROOT_DIR}}"

vars:
  MODULE: '{{.MODULE | default "github.com/complytime-labs/crosscodex"}}'
  TEST_DIR: '{{.TEST_DIR | default (printf "%s/.test-output" .ROOT_DIR)}}'

tasks:
  default:
    silent: true
    cmd: task test --list

  unit:
    desc: Run unit tests with spec tree output
    deps:
      - :dev:deps
      - :dev:generate
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - go run github.com/onsi/ginkgo/v2/ginkgo run --procs {{.GOMEGA_PROCS}} -r --randomize-all --fail-on-pending --json-report={{.TEST_DIR}}/ginkgo-report.json ./pkg/... ./internal/...
      - go run ./internal/tools/treeformat {{.TEST_DIR}}/ginkgo-report.json

  unit:verbose:
    desc: Run unit tests with Ginkgo verbose output (no tree)
    deps:
      - :dev:deps
      - :dev:generate
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - go run github.com/onsi/ginkgo/v2/ginkgo run --procs {{.GOMEGA_PROCS}} -v -r --randomize-all --fail-on-pending ./pkg/... ./internal/...

  unit:legacy:
    desc: Run unit tests with Go testing (legacy)
    deps:
      - :dev:deps
      - :dev:generate
    vars:
      MODE: '{{.MODE | default "human"}}'
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - cmd: go test -v -race -count=1 -coverprofile={{.TEST_DIR}}/coverage.out ./pkg/... 2>&1 | tee {{.TEST_DIR}}/test.log
      - task: report
        vars:
          MODE: "{{.MODE}}"

  # --- Internal helpers ---

  report:
    internal: true
    vars:
      MODE: '{{.MODE | default "human"}}'
    cmds:
      - cmd: |
          if [ "{{.MODE}}" = "llm" ]; then
            grep -E '(^---\s+(FAIL|PASS)|^FAIL|^ok\s)' {{.TEST_DIR}}/test.log
          else
            echo ""
            echo "Coverage:"
            go tool cover -func={{.TEST_DIR}}/coverage.out | tail -1
          fi
      - cmd: grep -q '^FAIL' {{.TEST_DIR}}/test.log && exit 1 || true

  ensure-deps:
    internal: true
    run: once
    cmds:
      - go mod download

  ensure-generate:
    internal: true
    run: once
    dir: "{{.ROOT_DIR}}/api/proto"
    cmds:
      - buf generate
    sources:
      - "**/*.proto"
      - buf.gen.yaml
    generates:
      - ../gen/go/**/*.pb.go
