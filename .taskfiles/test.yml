version: "3"

includes:
  integration:
    taskfile: test/integration.yml
    dir: "{{.ROOT_DIR}}"

vars:
  MODULE: '{{.MODULE | default "github.com/complytime-labs/crosscodex"}}'
  TEST_DIR: '{{.TEST_DIR | default (printf "%s/.test-output" .ROOT_DIR)}}'

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null

  unit:
    desc: Run unit tests with spec tree output
    deps:
      - :dev:deps
      - :dev:generate
    env:
      TEST_TRACE_DIR: "{{.TEST_DIR}}/traces"
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - go run github.com/onsi/ginkgo/v2/ginkgo run --procs {{.GOMEGA_PROCS}} -r --randomize-all --fail-on-pending --skip-package testgrpc --json-report={{.TEST_DIR}}/ginkgo-report.json ./pkg/... ./internal/...
      - go run github.com/trevor-vaughan/ginkgoleaf/cmd/ginkgoleaf@v0.1.0 -in {{.TEST_DIR}}/ginkgo-report.json -format {{.GINKGOLEAF_FORMAT}} -exit-code

  fuzz:
    desc: Run fuzz tests across all packages
    vars:
      FUZZ_TIME: '{{.FUZZ_TIME | default "10s"}}'
      FUZZ_TIMEOUT: '{{.FUZZ_TIMEOUT | default "2m"}}'
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - |
        failed=0
        for pkg in $(go list ./pkg/... ./internal/...); do
          fuzz_funcs=$(go test -list '^Fuzz' "$pkg" 2>/dev/null | grep '^Fuzz' || true)
          for func in $fuzz_funcs; do
            echo "==> Fuzzing $func in $pkg ({{.FUZZ_TIME}})"
            if ! go test "$pkg" -run '^$' -fuzz "^${func}$" -fuzztime={{.FUZZ_TIME}} -timeout={{.FUZZ_TIMEOUT}}; then
              failed=1
            fi
          done
        done
        exit $failed

  property:
    desc: Run property-based tests only
    deps:
      - :dev:deps
      - :dev:generate
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - go run github.com/onsi/ginkgo/v2/ginkgo run --procs {{.GOMEGA_PROCS}} -r --focus "Property Specifications" --skip-package testgrpc --json-report={{.TEST_DIR}}/property-report.json ./pkg/... ./internal/...
      - go run github.com/trevor-vaughan/ginkgoleaf/cmd/ginkgoleaf@v0.1.0 -in {{.TEST_DIR}}/property-report.json -format {{.GINKGOLEAF_FORMAT}} -exit-code
