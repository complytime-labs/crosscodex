version: "3"

includes:
  integration:
    taskfile: test/integration.yml
    dir: "{{.ROOT_DIR}}"

vars:
  MODULE: '{{.MODULE | default "github.com/complytime-labs/crosscodex"}}'
  TEST_DIR: '{{.TEST_DIR | default (printf "%s/.test-output" .ROOT_DIR)}}'

tasks:
  default:
    silent: true
    cmd: task test --list

  unit:
    desc: Run unit tests with spec tree output
    deps:
      - :dev:deps
      - :dev:generate
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - go run github.com/onsi/ginkgo/v2/ginkgo run --procs {{.GOMEGA_PROCS}} -r --randomize-all --fail-on-pending --json-report={{.TEST_DIR}}/ginkgo-report.json ./pkg/... ./internal/...
      - go run ./internal/tools/treeformat {{.TEST_DIR}}/ginkgo-report.json
