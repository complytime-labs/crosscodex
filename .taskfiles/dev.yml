version: "3"

vars:
  MODULE: '{{.MODULE | default "github.com/complytime-labs/crosscodex"}}'
  BUILD_DIR: '{{.BUILD_DIR | default (printf "%s/.build" .ROOT_DIR)}}'
  # Minimum Go version -- pinned to address GO-2026-5037 (crypto/x509).
  # Bump this when upgrading Go; deps:update re-applies it after go get -u.
  GO_VERSION: "1.26.4"

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null

  generate:
    desc: Generate all protobuf code
    deps: [generate:api, generate:testgrpc]

  generate:api:
    desc: Generate API protobuf code using buf
    dir: "{{.ROOT_DIR}}/api/proto"
    cmds:
      - go tool buf generate
    sources:
      - "**/*.proto"
      - buf.gen.yaml
    generates:
      - ../gen/go/**/*.pb.go

  generate:testgrpc:
    desc: Generate testgrpc protobuf code using buf
    dir: "{{.ROOT_DIR}}/internal/testgrpc/proto"
    cmds:
      - go tool buf generate
    sources:
      - "**/*.proto"
      - buf.gen.yaml
    generates:
      - ../gen/**/*.pb.go

  build:
    desc: Build all binaries
    deps: [deps, generate]
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo dev
      GIT_COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
      BUILD_DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      LDFLAGS: >-
        -X {{.MODULE}}/internal/version.Version={{.VERSION}}
        -X {{.MODULE}}/internal/version.GitCommit={{.GIT_COMMIT}}
        -X {{.MODULE}}/internal/version.BuildDate={{.BUILD_DATE}}
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -ldflags '{{.LDFLAGS}}' -o {{.BUILD_DIR}}/crosscodex {{.ROOT_DIR}}/cmd/crosscodex
      - go build -ldflags '{{.LDFLAGS}}' -o {{.BUILD_DIR}}/crosscodexd {{.ROOT_DIR}}/cmd/crosscodexd
    sources:
      - "{{.ROOT_DIR}}/**/*.go"
      - "{{.ROOT_DIR}}/go.mod"
      - "{{.ROOT_DIR}}/go.sum"
    generates:
      - "{{.BUILD_DIR}}/crosscodex"
      - "{{.BUILD_DIR}}/crosscodexd"

  lint:
    desc: Run linters
    deps: [deps, generate, lint:proto]
    dir: "{{.ROOT_DIR}}"
    cmds:
      # Fence off megalinter-reports so ./... stops at its boundary.
      # The directory is gitignored and ephemeral; a sentinel go.mod
      # makes Go treat it as a separate module without deleting anything.
      - test -d megalinter-reports && test ! -f megalinter-reports/go.mod && echo 'module megalinter-reports' > megalinter-reports/go.mod || true
      - go vet ./...
      - go fmt ./...
      - go tool golangci-lint run ./...

  lint:proto:
    desc: Run protolint on proto files
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go run github.com/yoheimuta/protolint/cmd/protolint@v0.56.4 lint --config_path={{.ROOT_DIR}}/.protolintrc.yml api/proto/
    sources:
      - api/proto/**/*.proto
      - .protolintrc.yml

  deps:
    desc: Download dependencies
    cmds:
      - go mod download

  deps:update:
    desc: Update all Go dependencies to latest minor/patch versions
    deps: [generate]
    cmds:
      - go get -u {{.ROOT_DIR}}/...
      - go mod tidy
      # Pin Go version after updates -- go get -u can regress the go directive
      # to match the local toolchain. This ensures the vulnerability fix floor
      # (GO-2026-5037: crypto/x509) is never downgraded.
      - go mod edit -go={{.GO_VERSION}} -toolchain=go{{.GO_VERSION}}

  tidy:
    desc: Tidy dependencies (run after generate to avoid removing generated code deps)
    deps: [deps, generate]
    cmds:
      - go mod tidy

  vulncheck:
    desc: Run govulncheck vulnerability scanner
    deps: [deps]
    cmds:
      - go tool govulncheck {{.ROOT_DIR}}/...

  fetch-schemas:
    desc: Fetch OSCAL and gemara schemas
    vars:
      OSCAL_VERSION:
        sh: curl -s https://api.github.com/repos/usnistgov/OSCAL/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/'
      GEMARA_VERSION:
        sh: curl -s https://api.github.com/repos/gemaraproj/gemara/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/'
      SCHEMAS_DIR: "{{.ROOT_DIR}}/schemas"
    cmds:
      - bash "{{.ROOT_DIR}}/scripts/fetch-schemas.sh" "{{.OSCAL_VERSION}}" "{{.GEMARA_VERSION}}" "{{.SCHEMAS_DIR}}"
