version: "3"

vars:
  MODULE: '{{.MODULE | default "github.com/complytime-labs/crosscodex"}}'
  TEST_DIR: '{{.TEST_DIR | default (printf "%s/.test-output" .ROOT_DIR)}}'
  CONTAINER_ENGINE: '{{.CONTAINER_ENGINE | default "podman"}}'
  POSTGRES_USER: '{{.POSTGRES_USER | default "postgres"}}'
  # Test-only credentials for local integration testing. Do NOT use in staging or production.
  POSTGRES_PASSWORD: '{{.POSTGRES_PASSWORD | default "integration"}}'
  POSTGRES_DB: '{{.POSTGRES_DB | default "crosscodex_test"}}'
  # Test-only credentials for local integration testing. Do NOT use in staging or production.
  RUSTFS_ACCESS_KEY: '{{.RUSTFS_ACCESS_KEY | default "rustfsadmin"}}'
  RUSTFS_SECRET_KEY: '{{.RUSTFS_SECRET_KEY | default "rustfsadmin"}}'
  RUSTFS_BUCKET: '{{.RUSTFS_BUCKET | default "crosscodex-test"}}'
  COMPOSE_CMD:
    sh: |
      # Derive compose command from CONTAINER_ENGINE to avoid cross-engine
      # volume/container mismatches (e.g. podman volumes invisible to docker).
      engine="{{.CONTAINER_ENGINE}}"
      case "$engine" in
        podman)
          # Prefer standalone podman-compose (pip) over "podman compose" plugin.
          # On GitHub Actions, "podman compose version" succeeds by discovering
          # /usr/libexec/docker/cli-plugins/docker-compose, which then fails at
          # runtime because it needs a Docker daemon socket.  The pip-installed
          # podman-compose speaks to podman natively and always works.
          if command -v podman-compose >/dev/null 2>&1; then
            echo "podman-compose"
          elif podman compose version >/dev/null 2>&1; then
            echo "podman compose"
          else
            echo "MISSING"
          fi
          ;;
        docker)
          if docker compose version >/dev/null 2>&1; then
            echo "docker compose"
          else
            echo "MISSING"
          fi
          ;;
        *)
          echo "MISSING"
          ;;
      esac
  COMPOSE_FILE: "{{.ROOT_DIR}}/test/compose.yaml"

# Global env: block — visible to all tasks including subtask calls.
# Task-level env: does NOT propagate to tasks invoked via "- task:" calls,
# so all integration test env vars must live here at the Taskfile level.
env:
  TEST_TRACE_DIR: "{{.TEST_DIR}}/traces"
  TEST_DATABASE_DSN: "postgres://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@localhost:15432/{{.POSTGRES_DB}}?sslmode=verify-full&sslrootcert={{.TEST_DIR}}/certs/ca.pem&sslcert={{.TEST_DIR}}/certs/client.pem&sslkey={{.TEST_DIR}}/certs/client-key.pem" # DevSkim: ignore DS162092 - integration test fixture DSN
  TEST_S3_ENDPOINT: "http://localhost:19000"
  TEST_S3_ACCESS_KEY: "{{.RUSTFS_ACCESS_KEY}}"
  TEST_S3_SECRET_KEY: "{{.RUSTFS_SECRET_KEY}}"
  TEST_S3_BUCKET: "{{.RUSTFS_BUCKET}}"
  TEST_NATS_URL: "tls://localhost:14222"
  TEST_NATS_CA: "{{.TEST_DIR}}/certs/ca.pem"
  TEST_NATS_CERT: "{{.TEST_DIR}}/certs/client.pem"
  TEST_NATS_KEY: "{{.TEST_DIR}}/certs/client-key.pem"
  TEST_AUTHN_URL: "https://localhost:18443"
  TEST_AUTHN_CA: "{{.TEST_DIR}}/certs/ca.pem"
  TEST_AUTHN_CERT: "{{.TEST_DIR}}/certs/client.pem"
  TEST_AUTHN_KEY: "{{.TEST_DIR}}/certs/client-key.pem"
  TEST_GRPC_ADDR: "localhost:19090"
  TEST_GRPC_CA: "{{.TEST_DIR}}/certs/ca.pem"
  TEST_GRPC_CERT: "{{.TEST_DIR}}/certs/client.pem"
  TEST_GRPC_KEY: "{{.TEST_DIR}}/certs/client-key.pem"
  TEST_OTLP_GRPC_ENDPOINT: "localhost:14317"
  TEST_OTLP_HTTP_ENDPOINT: "localhost:14318"
  TEST_JAEGER_QUERY_URL: "http://localhost:16686"
  TEST_LITELLM_URL: "http://localhost:14000"
  TEST_OLLAMA_HOST: "{{.OLLAMA_HOST}}"
  TEST_LLM_CHAT_MODEL: "small"
  TEST_LLM_EMBED_MODEL: "embed"

tasks:
  default:
    silent: true
    cmds:
      - task: all

  all:
    desc: Run all integration tests (db, storage, NATS, authn, grpc, telemetry, llm, and attestation)
    cmds:
      - task: ensure-deps
      - task: compose-up
        vars: { PROFILE: all }
      - defer:
          task: compose-down
          vars: { PROFILE: all }
      - mkdir -p {{.TEST_DIR}}
      # Ginkgo runs packages sequentially by default (no -p 1 needed).
      # pkg/db, pkg/graphdb, and internal/catalog all run migrations and
      # ALTER ROLE in SynchronizedBeforeSuite. Sequential execution avoids
      # "tuple concurrently updated" races on the pg_authid catalog row.
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 300s
          REPORT: integration-db
          COVERAGE: integration-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/db/... {{.ROOT_DIR}}/pkg/graphdb/... {{.ROOT_DIR}}/pkg/vectordb/... {{.ROOT_DIR}}/internal/catalog/... {{.ROOT_DIR}}/internal/analyzer/classify/... {{.ROOT_DIR}}/internal/analyzer/embedding/... {{.ROOT_DIR}}/internal/analyzer/relationship/... {{.ROOT_DIR}}/internal/synthesis/..."
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 300s
          REPORT: integration-storage
          COVERAGE: integration-storage-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/storage/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_nats
          TIMEOUT: 120s
          REPORT: integration-nats
          COVERAGE: integration-nats-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/natsbus/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_authn
          TIMEOUT: 120s
          REPORT: integration-authn
          COVERAGE: integration-authn-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/authn/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_grpc
          TIMEOUT: 120s
          REPORT: integration-grpc
          COVERAGE: integration-grpc-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/internal/testgrpc/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_telemetry
          TIMEOUT: 120s
          REPORT: integration-telemetry
          COVERAGE: integration-telemetry-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/telemetry/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_telemetry
          TIMEOUT: 120s
          REPORT: integration-jaeger-smoke
          COVERAGE: integration-jaeger-smoke-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/test/integration/..."
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 120s
          REPORT: integration-trace-propagation
          COVERAGE: integration-trace-propagation-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/test/integration/..."
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 120s
          REPORT: integration-attestation
          COVERAGE: integration-attestation-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/attestation/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_llm
          TIMEOUT: 600s
          REPORT: integration-llm
          COVERAGE: integration-llm-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/llmclient/... {{.ROOT_DIR}}/internal/analyzer/classify/... {{.ROOT_DIR}}/internal/analyzer/embedding/... {{.ROOT_DIR}}/internal/analyzer/relationship/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_worker
          TIMEOUT: 120s
          REPORT: integration-worker
          COVERAGE: integration-worker-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/internal/worker/..."

  worker:
    desc: Run worker integration tests (embedded NATS, no containers needed)
    deps: [ensure-deps]
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration_worker
          TIMEOUT: 120s
          REPORT: integration-worker
          COVERAGE: integration-worker-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/internal/worker/..."

  db:
    desc: Run database integration tests (db, graphdb, vectordb, catalog, analyzers)
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: db }
      - defer:
          task: compose-down
          vars: { PROFILE: db }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 300s
          REPORT: integration-db
          COVERAGE: integration-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/db/... {{.ROOT_DIR}}/pkg/graphdb/... {{.ROOT_DIR}}/pkg/vectordb/... {{.ROOT_DIR}}/internal/catalog/... {{.ROOT_DIR}}/internal/analyzer/classify/... {{.ROOT_DIR}}/internal/analyzer/embedding/... {{.ROOT_DIR}}/internal/analyzer/relationship/... {{.ROOT_DIR}}/internal/synthesis/..."

  synthesis:
    desc: Run synthesis service integration tests (persistViability, RLS, immutability trigger)
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: db }
      - defer:
          task: compose-down
          vars: { PROFILE: db }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 120s
          REPORT: integration-synthesis
          COVERAGE: integration-synthesis-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/internal/synthesis/..."

  storage:
    desc: Run S3 storage integration tests
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: storage }
      - defer:
          task: compose-down
          vars: { PROFILE: storage }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 300s
          REPORT: integration-storage
          COVERAGE: integration-storage-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/storage/..."

  nats:
    desc: Run external NATS integration tests
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: nats }
      - defer:
          task: compose-down
          vars: { PROFILE: nats }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration_nats
          TIMEOUT: 120s
          REPORT: integration-nats
          COVERAGE: integration-nats-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/natsbus/..."

  authn:
    desc: Run authn container integration tests (nginx mTLS proxy)
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: authn }
      - defer:
          task: compose-down
          vars: { PROFILE: authn }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration_authn
          TIMEOUT: 120s
          REPORT: integration-authn
          COVERAGE: integration-authn-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/authn/..."

  grpc:
    desc: Run gRPC tenant integration tests
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: grpc }
      - defer:
          task: compose-down
          vars: { PROFILE: grpc }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration_grpc
          TIMEOUT: 120s
          REPORT: integration-grpc
          COVERAGE: integration-grpc-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/internal/testgrpc/..."

  telemetry:
    desc: Run telemetry integration tests (Jaeger OTLP)
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: telemetry }
      - defer:
          task: compose-down
          vars: { PROFILE: telemetry }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration_telemetry
          TIMEOUT: 120s
          REPORT: integration-telemetry
          COVERAGE: integration-telemetry-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/telemetry/..."
      - task: run-ginkgo
        vars:
          TAGS: integration_telemetry
          TIMEOUT: 120s
          REPORT: integration-jaeger-smoke
          COVERAGE: integration-jaeger-smoke-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/test/integration/..."

  llm:
    desc: Run LLM integration tests (LiteLLM + Ollama + Jaeger full stack, analyzers)
    deps: [ensure-deps]
    cmds:
      - task: compose-up
        vars: { PROFILE: llm }
      - defer:
          task: compose-down
          vars: { PROFILE: llm }
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration_llm
          TIMEOUT: 600s
          REPORT: integration-llm
          COVERAGE: integration-llm-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/llmclient/... {{.ROOT_DIR}}/internal/analyzer/classify/... {{.ROOT_DIR}}/internal/analyzer/embedding/... {{.ROOT_DIR}}/internal/analyzer/relationship/..."

  trace-propagation:
    desc: Run cross-service trace propagation integration tests (embedded NATS)
    deps: [ensure-deps]
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 120s
          REPORT: integration-trace-propagation
          COVERAGE: integration-trace-propagation-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/test/integration/..."

  attestation:
    desc: Run attestation integration tests (embedded NATS, no containers needed)
    deps: [ensure-deps]
    cmds:
      - mkdir -p {{.TEST_DIR}}
      - task: run-ginkgo
        vars:
          TAGS: integration
          TIMEOUT: 120s
          REPORT: integration-attestation
          COVERAGE: integration-attestation-coverage.out
          PACKAGES: "{{.ROOT_DIR}}/pkg/attestation/..."

  clean:
    desc: Remove all integration test containers and their volumes
    cmds:
      - "{{.COMPOSE_CMD}} -f {{.COMPOSE_FILE}} --profile all down -v 2>/dev/null || true"
      - "{{.CONTAINER_ENGINE}} volume rm -f crosscodex-test-certs 2>/dev/null || true"

  compose-up:
    desc: "Start integration test containers (PROFILE=db|storage|nats|authn|all)"
    requires:
      vars: [PROFILE]
    preconditions:
      - sh: '[ "{{.COMPOSE_CMD}}" != "MISSING" ]'
        msg: "Neither 'docker compose' nor 'podman-compose' found. Install one to run integration tests."
    vars:
      NEEDS_CERTS: '{{if or (eq .PROFILE "db") (eq .PROFILE "nats") (eq .PROFILE "authn") (eq .PROFILE "grpc") (eq .PROFILE "all")}}true{{else}}false{{end}}'
    cmds:
      # Kill stale containers from interrupted runs (Ctrl+C skips the defer
      # in compose-down). Without this, port conflicts and stale state cause
      # flaky failures on the next run.
      - |
        stale=$({{.CONTAINER_ENGINE}} ps -a --filter "name=crosscodex-test-" --format "{{`{{.Names}}`}}" 2>/dev/null || true)
        if [ -n "$stale" ]; then
          echo "Cleaning up stale containers: $stale"
          for c in $stale; do
            {{.CONTAINER_ENGINE}} stop "$c" 2>/dev/null || true
            {{.CONTAINER_ENGINE}} rm -f "$c" 2>/dev/null || true
          done
        fi
      - task: '{{if eq .NEEDS_CERTS "true"}}prepare-cert-volume{{else}}ensure-deps{{end}}'
      - task: generate-litellm-config
        vars:
          PROFILE: "{{.PROFILE}}"
      # Pre-build the Ollama image (with baked-in models) for local runs.
      # Skipped when OLLAMA_HOST points to an external server or when the
      # profile doesn't include LLM services.
      - task: build-ollama-image
        vars:
          PROFILE: "{{.PROFILE}}"
      - |
        _scale=""
        _extra_compose=""
        if [ "{{.OLLAMA_HOST}}" != "http://localhost:11434" ]; then
          case "{{.PROFILE}}" in
            llm|all)
              _scale="--scale ollama=0"
              _extra_compose="-f {{.ROOT_DIR}}/test/compose.host-network.yaml"
              ;;
          esac
        fi
        {{.COMPOSE_CMD}} -f {{.COMPOSE_FILE}} ${_extra_compose} --profile {{.PROFILE}} up -d --build ${_scale}
      - task: compose-health
        vars:
          PROFILE: "{{.PROFILE}}"
      - task: ensure-ollama-models
        vars:
          PROFILE: "{{.PROFILE}}"

  compose-health:
    internal: true
    requires:
      vars: [PROFILE]
    cmds:
      - bash "{{.ROOT_DIR}}/scripts/integration-health.sh" "{{.PROFILE}}" "{{.CONTAINER_ENGINE}}" "{{.OLLAMA_HOST}}"

  compose-down:
    desc: "Stop integration test containers (PROFILE=db|storage|nats|authn|all)"
    requires:
      vars: [PROFILE]
    preconditions:
      - sh: '[ "{{.COMPOSE_CMD}}" != "MISSING" ]'
        msg: "Neither 'docker compose' nor 'podman-compose' found."
    cmds:
      # podman-compose --profile <p> down iterates ALL services in the
      # compose file and tries to stop/rm each by container_name, even
      # those belonging to other profiles that were never started.
      #
      # Workaround: discover running crosscodex-test-* containers and
      # stop only those, avoiding "no container with name or ID" noise.
      - |
        running=$({{.CONTAINER_ENGINE}} ps -a --filter "name=crosscodex-test-" --format "{{`{{.Names}}`}}" 2>/dev/null || true)
        for c in $running; do
          {{.CONTAINER_ENGINE}} stop "$c" 2>/dev/null || true
          {{.CONTAINER_ENGINE}} rm -f "$c" 2>/dev/null || true
        done

  generate-litellm-config:
    internal: true
    cmds:
      - bash "{{.ROOT_DIR}}/scripts/generate-litellm-config.sh" "{{.PROFILE}}" "{{.TASKFILE_DIR}}/litellm_config.yaml.tmpl" "{{.ROOT_DIR}}/.test-output/litellm_config.yaml" "{{.OLLAMA_HOST}}" "{{.OLLAMA_CHAT_MODEL}}" "{{.OLLAMA_EMBED_MODEL}}"

  ensure-ollama-models:
    internal: true
    cmds:
      - bash "{{.ROOT_DIR}}/scripts/ensure-ollama-models.sh" "{{.PROFILE}}" "{{.OLLAMA_HOST}}" "{{.OLLAMA_CHAT_MODEL}}" "{{.OLLAMA_EMBED_MODEL}}"

  # --- Internal helpers ---

  run-ginkgo:
    internal: true
    requires:
      vars: [TAGS, TIMEOUT, REPORT, COVERAGE, PACKAGES]
    cmds:
      - go run github.com/onsi/ginkgo/v2/ginkgo run -v --race --tags {{.TAGS}} --timeout {{.TIMEOUT}} --coverprofile {{.COVERAGE}} --output-dir {{.TEST_DIR}} --json-report={{.REPORT}}.json {{.PACKAGES}}
      - go run github.com/trevor-vaughan/ginkgoleaf/cmd/ginkgoleaf@v0.1.0 -in {{.TEST_DIR}}/{{.REPORT}}.json -format {{.GINKGOLEAF_FORMAT}} -exit-code

  ensure-deps:
    internal: true
    run: once
    cmds:
      - go mod download

  generate-certs:
    desc: Generate ephemeral TLS certificates for integration tests
    vars:
      CERTS_DIR: "{{.TEST_DIR}}/certs"
    cmds:
      - mkdir -p {{.CERTS_DIR}}
      - go run {{.ROOT_DIR}}/internal/testcerts/gen.go {{.CERTS_DIR}}
    status:
      # Verify certs exist, are parseable, not expired, and CA chain is valid.
      # Exits non-zero (triggering regeneration) if anything is wrong.
      - go run {{.ROOT_DIR}}/internal/testcerts/gen.go --verify {{.TEST_DIR}}/certs
    sources:
      - "{{.ROOT_DIR}}/internal/testcerts/*.go"

  build-db-image:
    desc: Build the integration test database image (PostgreSQL + AGE + pgvector)
    internal: true
    vars:
      CONTAINER_IMAGE: crosscodex-test-db:latest
    sources:
      - "{{.ROOT_DIR}}/pkg/db/testdata/Containerfile"
      - "{{.ROOT_DIR}}/pkg/db/testdata/pg_hba.conf"
    status:
      - "{{.CONTAINER_ENGINE}} image inspect crosscodex-test-db:latest >/dev/null 2>&1"
    cmds:
      - "{{.CONTAINER_ENGINE}} build -t {{.CONTAINER_IMAGE}} -f {{.ROOT_DIR}}/pkg/db/testdata/Containerfile {{.ROOT_DIR}}/pkg/db/testdata"

  build-ollama-image:
    desc: Build the Ollama test image with pre-baked models (llama3.2:1b + granite-embedding:30m)
    internal: true
    vars:
      CONTAINER_IMAGE: crosscodex-test-ollama:latest
    sources:
      - "{{.ROOT_DIR}}/test/ollama/Containerfile"
    status:
      - "{{.CONTAINER_ENGINE}} image inspect crosscodex-test-ollama:latest >/dev/null 2>&1"
    cmds:
      - "{{.CONTAINER_ENGINE}} build -t {{.CONTAINER_IMAGE}} -f {{.ROOT_DIR}}/test/ollama/Containerfile {{.ROOT_DIR}}/test/ollama"

  prepare-cert-volume:
    desc: Populate a named container volume with TLS certs (correct ownership)
    deps: [generate-certs, build-db-image]
    vars:
      VOLUME_NAME: crosscodex-test-certs
      CONTAINER_IMAGE: crosscodex-test-db:latest
    cmds:
      - "{{.CONTAINER_ENGINE}} volume create {{.VOLUME_NAME}} 2>/dev/null || true"
      # Copy certs into the volume and chown to postgres (for PostgreSQL's
      # strict ssl_key_file permission check). NATS runs as root and can
      # read these regardless. Also copies the fingerprint file so we can
      # detect stale volumes.
      - |
        {{.CONTAINER_ENGINE}} run --rm --user root \
          -v {{.VOLUME_NAME}}:/certs \
          -v {{.TEST_DIR}}/certs:/src:ro \
          --entrypoint sh \
          {{.CONTAINER_IMAGE}} \
          -c 'cp /src/*.pem /src/.fingerprint /certs/ && chown postgres:postgres /certs/* /certs/.fingerprint && chmod 600 /certs/*-key.pem'
    status:
      # Volume must exist AND its fingerprint must match the on-disk certs.
      # If certs were regenerated (sources changed), the fingerprint won't
      # match and the volume gets repopulated.
      - "{{.CONTAINER_ENGINE}} volume inspect {{.VOLUME_NAME}} >/dev/null 2>&1"
      - |
        DISK_FP=$(cat {{.TEST_DIR}}/certs/.fingerprint 2>/dev/null) || exit 1
        VOL_FP=$({{.CONTAINER_ENGINE}} run --rm \
          -v {{.VOLUME_NAME}}:/certs:ro \
          --entrypoint cat \
          docker.io/library/alpine:3 \
          /certs/.fingerprint 2>/dev/null) || exit 1
        [ "$DISK_FP" = "$VOL_FP" ]
