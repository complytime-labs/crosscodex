name: MegaLinter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run full scan weekly on Mondays at 3:17 AM UTC to catch issues from scanner updates
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  megalinter:
    name: MegaLinter Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: MegaLinter
        id: ml
        # zizmor:ignore ref-version-mismatch - No version tags available
        uses: trevor-vaughan/megalint-config@cc6d16f89d2408401b4a64647f95fd1323021573
        with:
          validate-all-codebase: ${{ github.event_name == 'schedule' }}

      - name: Archive reports
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: megalinter-reports
          path: |
            ${{ steps.ml.outputs.reports-dir }}
            mega-linter.log

      - name: Upload SARIF to GitHub Code Scanning
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.ml.outputs.sarif-file }}
