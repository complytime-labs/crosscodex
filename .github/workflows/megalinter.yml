name: MegaLinter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run full scan weekly on Mondays at 3:17 AM UTC to catch issues from scanner updates
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  megalinter:
    name: MegaLinter Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Materialize generated protobuf code (api/gen, internal/testgrpc/gen)
      # so golangci-lint's typecheck can resolve the generated packages.
      - name: Set up Go and generate code
        uses: ./.github/actions/go-setup
        with:
          github-token: ${{ github.token }}

      - name: MegaLinter
        id: ml
        uses: trevor-vaughan/megalint-config@latest # zizmor: ignore[unpinned-uses] -- always the best linter
        with:
          validate-all-codebase: ${{ github.event_name == 'schedule' }}
          github-comment: "true"
          extra-env-var: "GOTOOLCHAIN"
        env:
          # Allow Go toolchain auto-upgrade when go.mod requires newer version
          # MegaLinter ships with Go 1.26.3; go.mod requires 1.26.4 for security patches
          GOTOOLCHAIN: auto

      - name: Archive reports
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: megalinter-reports
          path: ${{ steps.ml.outputs.reports-dir }}

      - name: Upload SARIF to GitHub Code Scanning
        # Gate on sarif-has-results: a changed-files PR run whose diff touches
        # nothing a SARIF-emitting linter processes yields an empty `runs`
        # array, which upload-sarif rejects ("1 item required; only 0 were
        # supplied"). Skip the upload in that case.
        if: ${{ (success() || failure()) && steps.ml.outputs.sarif-has-results == 'true' }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ steps.ml.outputs.sarif-file }}
