name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Lint
        run: task lint

      - name: Security scan
        run: task dev:vulncheck

      - name: Test
        run: task test

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          MODULE: github.com/complytime-labs/crosscodex
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X ${MODULE}/internal/version.Version=${VERSION} -X ${MODULE}/internal/version.GitCommit=${GIT_COMMIT} -X ${MODULE}/internal/version.BuildDate=${BUILD_DATE}"

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            echo "Building for ${os}/${arch}..."
            GOOS="${os}" GOARCH="${arch}" go build -ldflags "${LDFLAGS}" -o ".build/crosscodex-${os}-${arch}" ./cmd/crosscodex
            GOOS="${os}" GOARCH="${arch}" go build -ldflags "${LDFLAGS}" -o ".build/crosscodexd-${os}-${arch}" ./cmd/crosscodexd
          done

      - name: Generate checksums
        run: |
          cd .build
          sha256sum crosscodex-* crosscodexd-* > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --generate-notes \
            .build/crosscodex-linux-amd64 \
            .build/crosscodexd-linux-amd64 \
            .build/crosscodex-linux-arm64 \
            .build/crosscodexd-linux-arm64 \
            .build/crosscodex-darwin-amd64 \
            .build/crosscodexd-darwin-amd64 \
            .build/crosscodex-darwin-arm64 \
            .build/crosscodexd-darwin-arm64 \
            .build/checksums.txt
