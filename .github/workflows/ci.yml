          key: taskfile-${{ runner.os }}-${{ hashFiles('.taskfiles/**/*.yml', 'Taskfile.yml') }}
          restore-keys: |
            taskfile-${{ runner.os }}-

      - name: Restore DB image cache
        id: db-image-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/crosscodex-test-db.tar
          key: db-image-${{ runner.os }}-${{ hashFiles('pkg/db/testdata/Containerfile', 'pkg/db/testdata/pg_hba.conf') }}

      - name: Load cached DB image
        if: steps.db-image-cache.outputs.cache-hit == 'true'
        run: podman load -i /tmp/crosscodex-test-db.tar

      - name: Install podman-compose
        run: pip install podman-compose

      - name: Run authn container integration tests
        run: task test:integration:authn

      - name: Save DB image for cache
        if: steps.db-image-cache.outputs.cache-hit != 'true'
        run: |
          if podman image inspect crosscodex-test-db:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-db.tar crosscodex-test-db:latest
          fi
