name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fips: ["", "1"]
    name: build (${{ matrix.fips == '1' && 'FIPS' || 'standard' }})
    env:
      FIPS: ${{ matrix.fips }}
      GOEXPERIMENT: ${{ matrix.fips == '1' && 'boringcrypto' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ github.token }}

      - name: Build
        run: task build

      - name: Lint
        if: matrix.fips == ''
        run: task lint

      - name: Security scan
        if: matrix.fips == ''
        run: task dev:vulncheck

      - name: Test
        run: task test GINKGOLEAF_FORMAT=github

      - name: Fuzz tests
        if: matrix.fips == ''
        run: task test:fuzz FUZZ_TIME=30s

  integration-tests:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      CONTAINER_ENGINE: podman
    steps:
      - name: Coverage summary
        run: |
          echo "::group::Integration coverage map (task test:integration:all)"
          echo "This job covers:"
          echo "  db, graphdb, vectordb, catalog ... integration-tests (this job)"
          echo "  storage .......................... integration-tests (this job)"
          echo "  trace-propagation ................ integration-tests (this job)"
          echo "  attestation ...................... integration-tests (this job)"
          echo "  worker ........................... integration-tests (this job)"
          echo ""
          echo "Covered by other jobs:"
          echo "  grpc ............................. integration-grpc"
          echo "  telemetry + jaeger-smoke ......... integration-telemetry"
          echo "  nats (FIPS matrix) ............... integration-nats"
          echo "  authn (FIPS matrix) .............. integration-authn"
          echo "  llm (Ollama + LiteLLM + Jaeger) .. integration-llm"
          echo "::endgroup::"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ github.token }}
          generate-test-certs: "true"

      - uses: ./.github/actions/integration-setup
        with:
          image-tar-path: /tmp/crosscodex-test-db.tar
          image-cache-key: db-image-${{ runner.os }}-${{ hashFiles('pkg/db/testdata/Containerfile', 'pkg/db/testdata/pg_hba.conf') }}

      - name: Run database integration tests (db, graphdb, vectordb)
        run: task test:integration:db

      - name: Run storage integration tests
        run: task test:integration:storage

      - name: Run trace-propagation integration tests
        run: task test:integration:trace-propagation

      - name: Run attestation integration tests
        run: task test:integration:attestation

      - name: Run worker integration tests
        run: task test:integration:worker

      - name: Save DB image for cache
        if: always()
        run: |
          if podman image inspect crosscodex-test-db:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-db.tar crosscodex-test-db:latest
          fi

  integration-nats:
    needs: [build]
    uses: ./.github/workflows/integration-fips.yml
    with:
      test-task: task test:integration:nats
    secrets:
      GITHUB_TOKEN: ${{ github.token }}

  integration-grpc:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      CONTAINER_ENGINE: podman
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ github.token }}
          generate-test-certs: "true"

      - uses: ./.github/actions/integration-setup
        with:
          image-tar-path: /tmp/crosscodex-test-db.tar
          image-cache-key: db-image-${{ runner.os }}-${{ hashFiles('pkg/db/testdata/Containerfile', 'pkg/db/testdata/pg_hba.conf') }}

      - name: Run gRPC integration tests
        run: task test:integration:grpc

      - name: Save DB image for cache
        if: always()
        run: |
          if podman image inspect crosscodex-test-db:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-db.tar crosscodex-test-db:latest
          fi

  integration-telemetry:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      CONTAINER_ENGINE: podman
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ github.token }}

      - uses: ./.github/actions/integration-setup

      - name: Run telemetry integration tests
        run: task test:integration:telemetry

  integration-llm:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      CONTAINER_ENGINE: podman
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ github.token }}

      - uses: ./.github/actions/integration-setup
        with:
          image-tar-path: /tmp/crosscodex-test-ollama.tar
          image-cache-key: ollama-image-${{ runner.os }}-${{ hashFiles('test/ollama/Containerfile') }}

      - name: Run LLM integration tests
        run: task test:integration:llm

      - name: Save Ollama image for cache
        if: always()
        run: |
          if podman image inspect crosscodex-test-ollama:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-ollama.tar crosscodex-test-ollama:latest
          fi

  integration-authn:
    needs: [build]
    uses: ./.github/workflows/integration-fips.yml
    with:
      test-task: task test:integration:authn
    secrets:
      GITHUB_TOKEN: ${{ github.token }}
