name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x

      - name: Install Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Download dependencies
        run: task dev:deps

      - name: Generate code
        run: task generate

      - name: Build
        run: task build

      - name: Lint
        run: task lint

      - name: Security scan
        run: govulncheck ./...

      - name: Test
        run: task test

  integration-tests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x

      - name: Install Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        run: task dev:deps

      - name: Generate code
        run: task generate

      - name: Start PostgreSQL (custom image with AGE + pgvector)
        run: task dev:test-integration-db-up
        env:
          CONTAINER_ENGINE: podman

      - name: Start RustFS
        run: task dev:test-integration-storage-up
        env:
          CONTAINER_ENGINE: podman

      - name: Run integration tests
        env:
          TEST_DATABASE_DSN: "postgres://postgres:integration@localhost:15432/crosscodex_test?sslmode=disable"
          TEST_S3_ENDPOINT: http://localhost:19000
          TEST_S3_ACCESS_KEY: rustfsadmin
          TEST_S3_SECRET_KEY: rustfsadmin
          TEST_S3_BUCKET: crosscodex-test
        run: |
          mkdir -p .test-output
          # -p 1: pkg/db and pkg/graphdb both run migrations and ALTER ROLE in
          # TestMain. Without serialization they race on the pg_authid catalog row.
          go test -v -tags integration -race -count=1 -p 1 -timeout 300s ./pkg/db/... ./pkg/graphdb/... ./pkg/storage/... 2>&1 | tee .test-output/integration.log

      - name: Stop containers
        if: always()
        env:
          CONTAINER_ENGINE: podman
        run: |
          ${CONTAINER_ENGINE} rm -f crosscodex-test-db || true
          ${CONTAINER_ENGINE} rm -f crosscodex-test-storage || true
