name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fips: ["", "1"]
    name: build (${{ matrix.fips == '1' && 'FIPS' || 'standard' }})
    env:
      FIPS: ${{ matrix.fips }}
      GOEXPERIMENT: ${{ matrix.fips == '1' && 'boringcrypto' || '' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Lint
        if: matrix.fips == ''
        run: task lint

      - name: Security scan
        if: matrix.fips == ''
        run: task dev:vulncheck

      - name: Test
        run: task test GINKGOLEAF_FORMAT=github

      - name: Fuzz tests
        if: matrix.fips == ''
        run: task test:fuzz FUZZ_TIME=30s

  integration-tests:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      CONTAINER_ENGINE: podman
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          generate-test-certs: "true"

      - name: Restore Taskfile checksum cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .task/
          key: taskfile-${{ runner.os }}-${{ hashFiles('.taskfiles/**/*.yml', 'Taskfile.yml') }}
          restore-keys: |
            taskfile-${{ runner.os }}-

      - name: Restore DB image cache
        id: db-image-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/crosscodex-test-db.tar
          key: db-image-${{ runner.os }}-${{ hashFiles('pkg/db/testdata/Containerfile', 'pkg/db/testdata/pg_hba.conf') }}

      - name: Load cached DB image
        if: steps.db-image-cache.outputs.cache-hit == 'true'
        run: podman load -i /tmp/crosscodex-test-db.tar

      - name: Restore Ollama image cache
        id: ollama-image-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/crosscodex-test-ollama.tar
          key: ollama-image-${{ runner.os }}-${{ hashFiles('test/ollama/Containerfile') }}

      - name: Load cached Ollama image
        if: steps.ollama-image-cache.outputs.cache-hit == 'true'
        run: podman load -i /tmp/crosscodex-test-ollama.tar

      - name: Install podman-compose
        run: pip install podman-compose

      - name: Run database integration tests (db, graphdb, vectordb)
        run: task test:integration:db

      - name: Run storage integration tests
        run: task test:integration:storage

      - name: Save DB image for cache
        if: steps.db-image-cache.outputs.cache-hit != 'true'
        run: |
          if podman image inspect crosscodex-test-db:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-db.tar crosscodex-test-db:latest
          fi

      - name: Save Ollama image for cache
        if: steps.ollama-image-cache.outputs.cache-hit != 'true'
        run: |
          if podman image inspect crosscodex-test-ollama:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-ollama.tar crosscodex-test-ollama:latest
          fi

  integration-nats:
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fips: ["", "1"]
    name: integration-nats (${{ matrix.fips == '1' && 'FIPS' || 'standard' }})
    env:
      FIPS: ${{ matrix.fips }}
      CONTAINER_ENGINE: podman
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          generate-test-certs: "true"

      - name: Restore Taskfile checksum cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .task/
          key: taskfile-${{ runner.os }}-${{ hashFiles('.taskfiles/**/*.yml', 'Taskfile.yml') }}
          restore-keys: |
            taskfile-${{ runner.os }}-

      - name: Restore DB image cache
        id: db-image-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/crosscodex-test-db.tar
          key: db-image-${{ runner.os }}-${{ hashFiles('pkg/db/testdata/Containerfile', 'pkg/db/testdata/pg_hba.conf') }}

      - name: Load cached DB image
        if: steps.db-image-cache.outputs.cache-hit == 'true'
        run: podman load -i /tmp/crosscodex-test-db.tar

      - name: Install podman-compose
        run: pip install podman-compose

      - name: Run NATS integration tests
        run: task test:integration:nats

      - name: Save DB image for cache
        if: steps.db-image-cache.outputs.cache-hit != 'true'
        run: |
          if podman image inspect crosscodex-test-db:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-db.tar crosscodex-test-db:latest
          fi

  integration-authn:
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fips: ["", "1"]
    name: integration-authn (${{ matrix.fips == '1' && 'FIPS' || 'standard' }})
    env:
      FIPS: ${{ matrix.fips }}
      CONTAINER_ENGINE: podman
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          generate-test-certs: "true"

      - name: Restore Taskfile checksum cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .task/
          key: taskfile-${{ runner.os }}-${{ hashFiles('.taskfiles/**/*.yml', 'Taskfile.yml') }}
          restore-keys: |
            taskfile-${{ runner.os }}-

      - name: Restore DB image cache
        id: db-image-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/crosscodex-test-db.tar
          key: db-image-${{ runner.os }}-${{ hashFiles('pkg/db/testdata/Containerfile', 'pkg/db/testdata/pg_hba.conf') }}

      - name: Load cached DB image
        if: steps.db-image-cache.outputs.cache-hit == 'true'
        run: podman load -i /tmp/crosscodex-test-db.tar

      - name: Install podman-compose
        run: pip install podman-compose

      - name: Run authn container integration tests
        run: task test:integration:authn

      - name: Save DB image for cache
        if: steps.db-image-cache.outputs.cache-hit != 'true'
        run: |
          if podman image inspect crosscodex-test-db:latest >/dev/null 2>&1; then
            podman save -o /tmp/crosscodex-test-db.tar crosscodex-test-db:latest
          fi
