name: Integration Test Setup
description: Shared setup for integration test jobs — disk space, caches, podman-compose

inputs:
  image-tar-path:
    description: Path to cached image tarball (empty = skip image caching)
    required: false
    default: ""
  image-cache-key:
    description: Full cache key for the container image (caller computes hashFiles)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Free disk space
      shell: bash
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
          /opt/ghc /usr/local/share/boost
        sudo apt-get clean
        df -h /

    - name: Restore Taskfile checksum cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .task/
        key: taskfile-${{ runner.os }}-${{ hashFiles('.taskfiles/**/*.yml', 'Taskfile.yml') }}
        restore-keys: |
          taskfile-${{ runner.os }}-

    - name: Restore container image cache
      if: inputs.image-tar-path != ''
      id: image-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ inputs.image-tar-path }}
        key: ${{ inputs.image-cache-key }}

    - name: Load cached container image
      if: inputs.image-tar-path != '' && steps.image-cache.outputs.cache-hit == 'true'
      shell: bash
      run: podman load -i ${{ inputs.image-tar-path }}

    - name: Install podman-compose
      shell: bash
      run: pip install podman-compose
