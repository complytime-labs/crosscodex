# Consolidated integration test infrastructure.
# Usage:
#   podman-compose -f test/compose.yaml up -d db storage nats
#   docker compose -f test/compose.yaml up -d db storage nats
#
# Certificate volume (crosscodex-test-certs) must be populated before
# starting services that need TLS. Use: task test:integration:generate-certs
# followed by task test:integration:prepare-cert-volume

services:
  db:
    profiles: [db, all]
    image: crosscodex-test-db:latest
    container_name: crosscodex-test-db
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: integration # checkov:skip=CKV_SECRET_6 test-only credential for ephemeral integration test container
      POSTGRES_DB: crosscodex_test
    volumes:
      - certs:/certs
    command: >
      postgres
        -c shared_preload_libraries=age
        -c hba_file=/etc/postgresql/pg_hba.conf
        -c ssl=on
        -c ssl_cert_file=/certs/server.pem
        -c ssl_key_file=/certs/server-key.pem
        -c ssl_ca_file=/certs/ca.pem
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -q"]
      interval: 2s
      timeout: 5s
      retries: 30

  storage:
    profiles: [storage, all]
    image: docker.io/rustfs/rustfs:1.0.0-beta.3
    container_name: crosscodex-test-storage
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin # DevSkim: ignore DS126858 - test-only credential for ephemeral integration test container
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:9000/"]
      interval: 2s
      timeout: 5s
      retries: 15

  nats:
    profiles: [nats, all]
    image: docker.io/nats:2.11-alpine
    container_name: crosscodex-test-nats
    ports:
      - "14222:4222"
    volumes:
      - certs:/certs
    command: >
      --tls
      --tlscert=/certs/server.pem
      --tlskey=/certs/server-key.pem
      --tlscacert=/certs/ca.pem
      --tlsverify
      --jetstream
    healthcheck:
      test: ["CMD-SHELL", "nats-server --help >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 15

  authn-proxy:
    profiles: [authn, all]
    image: docker.io/library/nginx:1.27-alpine
    container_name: crosscodex-test-authn
    ports:
      - "18443:443"
    volumes:
      - certs:/certs:ro
      - ./authn/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 2s
      timeout: 5s
      retries: 15

  grpc:
    profiles: [grpc, all]
    build:
      context: ../
      dockerfile: test/grpc/Containerfile
    container_name: crosscodex-test-grpc
    # Run as postgres (999) so the test binary can read the shared TLS key
    # files which are chowned to postgres:postgres with mode 0600.
    user: "999:999"
    ports:
      - "19090:9090"
    volumes:
      - certs:/certs
    environment:
      TEST_DATABASE_DSN: "postgres://postgres:${POSTGRES_PASSWORD:-integration}@db:5432/crosscodex_test?sslmode=verify-full&sslrootcert=/certs/ca.pem&sslcert=/certs/client.pem&sslkey=/certs/client-key.pem" # DevSkim: ignore DS162092 - integration test fixture DSN
      TEST_NATS_URL: "tls://nats:4222" # checkov:skip=CKV_SECRET_6 not a credential
      TEST_NATS_CA: "/certs/ca.pem"
      TEST_NATS_CERT: "/certs/client.pem"
      TEST_NATS_KEY: "/certs/client-key.pem"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/grpc-health-probe",
          "-addr=localhost:9090",
          "-tls",
          "-tls-ca-cert=/certs/ca.pem",
          "-tls-client-cert=/certs/client.pem",
          "-tls-client-key=/certs/client-key.pem",
        ]
      interval: 2s
      timeout: 5s
      retries: 15

  ollama:
    profiles: [llm, all]
    # Ollama doesn't publish semver tags on Docker Hub beyond 0.11.x;
    # latest tracks the current stable release (verified as 0.30.6).
    image: docker.io/ollama/ollama:latest
    container_name: crosscodex-test-ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  litellm:
    profiles: [llm, all]
    image: docker.io/litellm/litellm:1.87.1
    container_name: crosscodex-test-litellm
    ports:
      - "14000:4000"
    volumes:
      - ../.test-output/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\""]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s

  jaeger:
    profiles: [telemetry, llm, all]
    image: docker.io/jaegertracing/all-in-one:1.76.0
    container_name: crosscodex-test-jaeger
    ports:
      - "14317:4317" # OTLP gRPC
      - "14318:4318" # OTLP HTTP
      - "16686:16686" # Query API
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  certs:
    external: true
    name: crosscodex-test-certs
