# nginx mTLS proxy for authn integration tests.
# Terminates TLS with client certificate verification using OpenSSL,
# then returns client cert details in response headers for validation.

worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /dev/stdout;

    server {
        listen 443 ssl;
        server_name localhost;

        # Server certificate (signed by test CA)
        ssl_certificate     /certs/server.pem;
        ssl_certificate_key /certs/server-key.pem;

        # Client certificate verification
        ssl_client_certificate /certs/ca.pem;
        ssl_verify_client on;
        ssl_verify_depth 2;

        # TLS settings matching FIPS-safe defaults
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Return client cert details for test assertions
        location / {
            add_header X-Client-DN $ssl_client_s_dn always;
            add_header X-Client-Verify $ssl_client_verify always;
            add_header X-Client-Serial $ssl_client_serial always;
            add_header X-Client-Fingerprint $ssl_client_fingerprint always;
            return 200 "mTLS OK\n";
        }

        location /health {
            # Note: ssl_verify_client cannot be overridden per-location in
            # nginx, so this endpoint also requires a client certificate.
            # Healthchecks use "nginx -t" via container exec instead.
            return 200 "healthy\n";
        }
    }
}
